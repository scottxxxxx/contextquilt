# ContextQuilt — Self-Hosted Deployment
#
# Runs the full CQ stack: REST API + MCP server + cold path worker + Postgres + Redis.
#
# Quick start:
#   cp .env.example .env   # Edit with your API keys
#   docker compose up -d
#
# Endpoints:
#   REST API:    http://localhost:8000      (for app integration)
#   MCP Server:  http://localhost:8001/sse  (for MCP clients)
#   Dashboard:   http://localhost:8000/dashboard/
#   API Docs:    http://localhost:8000/docs
#   Health:      http://localhost:8000/health

services:
  # REST API — the primary interface for app integrations
  context-quilt:
    build: .
    container_name: contextquilt
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/context_quilt
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
      - CQ_LLM_API_KEY=${CQ_LLM_API_KEY}
      - CQ_LLM_BASE_URL=${CQ_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - CQ_LLM_MODEL=${CQ_LLM_MODEL:-mistralai/mistral-small-3.1-24b-instruct}
      - CQ_ADMIN_KEY=${CQ_ADMIN_KEY:-admin}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

  # MCP Server — Model Context Protocol endpoint for AI agent clients
  context-quilt-mcp:
    build: .
    container_name: contextquilt-mcp
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/context_quilt
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      - MCP_PORT=8001
      - MCP_API_KEY=${MCP_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: python src/mcp_server.py --transport sse --port 8001

  # Cold Path Worker — async extraction pipeline
  context-quilt-worker:
    build: .
    container_name: contextquilt-worker
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/context_quilt
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      - CQ_LLM_API_KEY=${CQ_LLM_API_KEY}
      - CQ_LLM_BASE_URL=${CQ_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - CQ_LLM_MODEL=${CQ_LLM_MODEL:-mistralai/mistral-small-3.1-24b-instruct}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: python src/worker.py

  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contextquilt-db
    environment:
      - POSTGRES_DB=context_quilt
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: contextquilt-cache
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
