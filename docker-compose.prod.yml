services:
  context-quilt:
    image: ${GHCR_IMAGE:-ghcr.io/scottxxxxx/contextquilt:latest}
    container_name: contextquilt
    env_file:
      - .env.prod
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@cq-postgres:5432/context_quilt
      - REDIS_HOST=cq-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CQ_LLM_API_KEY=${CQ_LLM_API_KEY}
      - CQ_LLM_BASE_URL=${CQ_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - CQ_LLM_MODEL=${CQ_LLM_MODEL:-anthropic/claude-haiku-4.5}
      - CQ_ADMIN_KEY=${CQ_ADMIN_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      cq-postgres:
        condition: service_healthy
      cq-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cq-internal
      - proxy-tier

  context-quilt-worker:
    image: ${GHCR_IMAGE:-ghcr.io/scottxxxxx/contextquilt:latest}
    container_name: contextquilt-worker
    env_file:
      - .env.prod
    command: python src/worker.py
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@cq-postgres:5432/context_quilt
      - REDIS_URL=redis://:${REDIS_PASSWORD}@cq-redis:6379/0
      - CQ_LLM_API_KEY=${CQ_LLM_API_KEY}
      - CQ_LLM_BASE_URL=${CQ_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - CQ_LLM_MODEL=${CQ_LLM_MODEL:-anthropic/claude-haiku-4.5}
    depends_on:
      cq-postgres:
        condition: service_healthy
      cq-redis:
        condition: service_healthy
    restart: unless-stopped
    # Override the image-level HEALTHCHECK (curl localhost:8000) which
    # only makes sense for the API container. The worker is a background
    # process — Docker's restart policy handles crash recovery. We read
    # /proc/1/cmdline directly because procps (pgrep) isn't in the slim
    # base image.
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'src/worker.py' /proc/1/cmdline || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - cq-internal

  cq-postgres:
    image: postgres:15-alpine
    container_name: cq-postgres
    environment:
      - POSTGRES_DB=context_quilt
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - cq-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cq-internal

  cq-redis:
    image: redis:7-alpine
    container_name: cq-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - cq-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cq-internal

volumes:
  cq-postgres-data:
  cq-redis-data:

networks:
  cq-internal:
  proxy-tier:
    external: true
