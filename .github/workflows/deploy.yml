name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          script: |
            cd /opt/contextquilt

            # Pull latest code (for migrations and config)
            sudo git pull origin main --ff-only || true

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest and restart CQ containers
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

            # Run migrations (idempotent — all use IF NOT EXISTS / ADD IF NOT EXISTS)
            echo "Running migrations..."
            for f in init-db/*.sql; do
              echo "  → $f"
              sudo docker exec -i $(sudo docker ps -q -f name=cq-postgres) psql -U postgres -d context_quilt < "$f" 2>&1 || true
            done
            echo "Migrations complete."

            sudo docker image prune -af --filter "until=24h"
