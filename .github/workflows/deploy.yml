name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          # Fail fast on any step that errors. Previous version used
          # `|| true` liberally, which silently hid a multi-month drift
          # between the repo and /opt/contextquilt/ — caught during the
          # v1 prod rollout (see docs/ops/incidents/).
          script: |
            set -euo pipefail

            cd /opt/contextquilt

            # --- Repo sync ---
            # /opt/contextquilt must be a checked-out git repo. If it
            # isn't (drift recovery), initialize it before pulling.
            if [ ! -d .git ]; then
              echo "WARN: /opt/contextquilt is not a git repo — bootstrapping"
              sudo git init
              sudo git remote add origin https://github.com/${{ github.repository }}.git \
                || sudo git remote set-url origin https://github.com/${{ github.repository }}.git
            fi

            sudo git fetch origin main
            # Hard reset to origin/main to guarantee on-disk init-db/,
            # docker-compose files, and workflow helpers match the
            # commit that triggered this deploy. Tracked files get
            # overwritten; .gitignored files (.env.prod, .env.mcp)
            # survive.
            sudo git reset --hard origin/main

            # --- Image build + container restart ---
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

            # --- Migrations ---
            # Apply every init-db/*.sql (migrations are idempotent via
            # IF NOT EXISTS / DO-block guards). Abort on first failure;
            # silent-swallow was the root cause of the v1 drift.
            echo "Running migrations..."
            MIGRATION_FAILED=""
            for f in init-db/*.sql; do
              echo "  → $f"
              if ! sudo docker exec -i $(sudo docker ps -q -f name=cq-postgres) \
                   psql -U postgres -d context_quilt -v ON_ERROR_STOP=1 < "$f"; then
                echo "ERROR: migration $f failed"
                MIGRATION_FAILED="$f"
                break
              fi
            done
            if [ -n "$MIGRATION_FAILED" ]; then
              echo "Aborting deploy — migration $MIGRATION_FAILED did not apply cleanly."
              exit 1
            fi
            echo "Migrations complete."

            # --- MCP stack (separate compose + env file) ---
            # If the MCP stack is deployed here, keep it in sync too.
            if [ -f docker-compose.mcp.yml ] && [ -f .env.mcp ]; then
              echo "Syncing MCP stack..."
              sudo docker compose -f docker-compose.mcp.yml --env-file .env.mcp pull
              sudo docker compose -f docker-compose.mcp.yml --env-file .env.mcp up -d
            fi

            sudo docker image prune -af --filter "until=24h"
